<!DOCTYPE html>
<html lang="zh-Eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AH KEE CAFE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBg:'#f6f5f1',
                        brandDark:'#1a1a1a',
                        brandGold:'#8b8368',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-brandBg text-brand font-sans antialiased">

    <nav class="w-full bg-brandBg/90 backdrop-blur-md sticky top-0 z-50 border-b border-gray-200/50">
        <div class="max-w-7xl mx-auto px-6 h-24 flex justify-between items-center">
            <div class="text-xl md:text-2xl font-serif tracking-wider font-bold leading-tight uppercase">
                Ah Kee Cafe    
            </div>

            <div class="flex space-x-8 text-xs uppercase tracking-widest items-center font-medium">
                <a href="#about" class="hover:text-brandGold transition">About</a>
                <a href="#menu" class="hover:text-brandGold transition">Menu</a>
                <a href="#location" class="hover:text-brandGold transition">locations</a>
                <a href="#reserve" class="bg-brandGold text-white px-6 py-3 tracking-wider hover:bg-opacity-90 transition text-center min-w-[120px]">
                    Reserve Now
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 lg:px-12 py-12 space-y-24">
        <section id="about" class="relative w-full h-[70vh] md:h-[85vh] overflow-hidden rounded-2xl shadow-md">
            <div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 hover:scale-105" 
                style="background-image: url('image/river.jpg');">
            </div>
            
            <div class="absolute inset-0 bg-black/30"></div>
            
            <div class="absolute inset-0 flex flex-col justify-end p-8 md:p-16 text-white z-10">
                <h1 class="text-4xl md:text-7xl font-serif tracking-wider font-bold mb-4 uppercase leading-none">
                    Ah Kee Cafe
                </h1>
                <p class="text-xs md:text-sm tracking-[0.2em] uppercase text-gray-200">
                    A Food, A Drinks, Relax.<br>KAPIT, SARAWAK.
                </p>
                <div class="mt-8 animate-bounce text-xl text-gray-300">↓</div>
            </div>
        </section>

        <section id="menu" class="space-y-8 pt-6">
            <div class="space-y-1">
                <p class="text-xl md:text-2xl font-serif uppercase tracking-widest text-brandDark">Foods Menu</p>
            </div>
            
            <div id="food-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                </div>
        </section>

        <section id="drinks" class="space-y-8 pt-6">
            <div class="space-y-1">
                <p class="text-xl md:text-2xl font-serif uppercase tracking-widest text-brandDark">Drinks Menu</p>
            </div>
            
            <div id="drink-tabs" class="flex flex-wrap gap-3 text-xs uppercase tracking-wider font-bold">
                <button onclick="filterDrinks('all', this)" class="tab-btn bg-brandGold text-white px-4 py-2 rounded-full transition shadow-sm">All</button>
                <button onclick="filterDrinks('coffee', this)" class="tab-btn bg-white text-gray-600 px-4 py-2 rounded-full border border-gray-200 hover:bg-gray-50 transition shadow-sm">Coffee</button>
                <button onclick="filterDrinks('tea', this)" class="tab-btn bg-white text-gray-600 px-4 py-2 rounded-full border border-gray-200 hover:bg-gray-50 transition shadow-sm">Tea</button>
                <button onclick="filterDrinks('desserts', this)" class="tab-btn bg-white text-gray-600 px-4 py-2 rounded-full border border-gray-200 hover:bg-gray-50 transition shadow-sm">Desserts</button>
            </div>

            <div id="drinks-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </section>

        <section id="location" class="space-y-8 pb-12 pt-6">
            <div class="space-y-1">
                <p class="text-xl md:text-2xl font-serif uppercase tracking-widest text-brandDark">Visit Us</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                
                <div class="rounded-2xl overflow-hidden shadow-sm border border-gray-200/60 h-64 md:h-80 bg-gray-100 relative">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3795.246029536683!2d112.94129919999999!3d2.0176357000000005!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3202bf90053190f9%3A0xaac7746d4f6408f8!2sAh%20Kee%20Cafe!5e1!3m2!1szh-CN!2smy!4v1783047285481!5m2!1szh-CN!2smy9" 
                        class="w-full h-full border-0" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
                
                <div class="space-y-8">
                    <div class="space-y-2">
                        <h4 class="font-serif uppercase tracking-wider text-sm md:text-base text-brandDark font-bold">Ah Kee Cafe</h4>
                        <p class="text-gray-500 text-xs md:text-sm tracking-wide leading-relaxed">
                            Terminal Wharf Kapit,<br>
                            MON - FRI: 7:00 AM - 5:00 PM<br>
                            WEEKENDS: 7:00 AM - 12:00 PM
                        </p>
                    </div>
                    
                    <div class="flex space-x-6 text-[11px] font-bold uppercase tracking-[0.2em] pt-6 border-t border-gray-200/60">
                        <a href="#" class="text-gray-600 hover:text-brandGold transition">Instagram</a>
                        <a href="#" class="text-gray-600 hover:text-brandGold transition">Facebook</a>
                        <a href="#" class="text-gray-600 hover:text-brandGold transition">WhatsApp</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
